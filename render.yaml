services:
  - type: web
    name: buildbridge-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HF_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: STELLAR_NETWORK
        value: mainnet
      - key: STELLAR_HORIZON_URL
        value: https://horizon.stellar.org
      - key: SOROBAN_RPC_URL
        value: https://soroban.stellar.org
      - key: MILESTONE_CONTRACT_ID
        sync: false
      - key: WEB_URL
        sync: false
